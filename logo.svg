<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="hat" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="brim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="245" fill="#0f172a" stroke="#1e293b" stroke-width="4"/>

  <!-- Graph edges (drawn behind everything) -->
  <g stroke="#6366f1" stroke-width="3" opacity="0.5">
    <!-- Main constellation edges -->
    <line x1="148" y1="340" x2="256" y2="390"/>
    <line x1="256" y1="390" x2="364" y2="340"/>
    <line x1="148" y1="340" x2="110" y2="420"/>
    <line x1="364" y1="340" x2="402" y2="420"/>
    <line x1="256" y1="390" x2="256" y2="455"/>
    <line x1="110" y1="420" x2="256" y2="455"/>
    <line x1="402" y1="420" x2="256" y2="455"/>
    <!-- Upper edges connecting to hat area -->
    <line x1="148" y1="340" x2="180" y2="280"/>
    <line x1="364" y1="340" x2="332" y2="280"/>
    <line x1="180" y1="280" x2="332" y2="280"/>
    <!-- Small side edges -->
    <line x1="110" y1="420" x2="80" y2="380"/>
    <line x1="402" y1="420" x2="432" y2="380"/>
  </g>

  <!-- Sparkle edges (thinner, decorative) -->
  <g stroke="#a78bfa" stroke-width="1.5" opacity="0.3">
    <line x1="80" y1="380" x2="148" y2="340"/>
    <line x1="432" y1="380" x2="364" y2="340"/>
    <line x1="180" y1="280" x2="148" y2="340"/>
    <line x1="332" y1="280" x2="364" y2="340"/>
  </g>

  <!-- Wizard hat -->
  <g>
    <!-- Hat cone -->
    <path d="M 160,285 L 256,68 L 352,285 Z" fill="url(#hat)" stroke="#6366f1" stroke-width="2"/>
    <!-- Hat brim -->
    <ellipse cx="256" cy="285" rx="120" ry="28" fill="url(#brim)" stroke="#6366f1" stroke-width="2"/>
    <!-- Hat band -->
    <rect x="170" y="268" width="172" height="18" rx="4" fill="#1e1b4b" opacity="0.7"/>
    <!-- Band buckle -->
    <rect x="240" y="265" width="32" height="24" rx="3" fill="#fbbf24" stroke="#d97706" stroke-width="1.5"/>
    <rect x="248" y="271" width="16" height="12" rx="2" fill="#1e1b4b"/>
  </g>

  <!-- Star on hat tip -->
  <g transform="translate(256, 62)" filter="url(#glow)">
    <polygon points="0,-18 5,-6 18,-6 8,3 12,16 0,9 -12,16 -8,3 -18,-6 -5,-6"
             fill="url(#star)" stroke="#fbbf24" stroke-width="1"/>
  </g>

  <!-- Small floating stars -->
  <g fill="#fbbf24" opacity="0.6">
    <polygon points="105,120 108,128 116,128 110,133 112,141 105,136 98,141 100,133 94,128 102,128" transform="scale(0.7) translate(50,50)"/>
    <polygon points="390,95 393,103 401,103 395,108 397,116 390,111 383,116 385,108 379,103 387,103" transform="scale(0.6) translate(200,80)"/>
    <polygon points="420,180 422,186 428,186 423,190 425,196 420,192 415,196 417,190 412,186 418,186" transform="scale(0.8) translate(80,20)"/>
  </g>

  <!-- Graph nodes (drawn on top) -->
  <g filter="url(#nodeGlow)">
    <!-- Upper nodes (near hat) -->
    <circle cx="180" cy="280" r="9" fill="#818cf8" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="332" cy="280" r="9" fill="#818cf8" stroke="#c7d2fe" stroke-width="2"/>

    <!-- Middle row -->
    <circle cx="148" cy="340" r="11" fill="#a78bfa" stroke="#ddd6fe" stroke-width="2"/>
    <circle cx="256" cy="390" r="12" fill="#c084fc" stroke="#e9d5ff" stroke-width="2.5"/>
    <circle cx="364" cy="340" r="11" fill="#a78bfa" stroke="#ddd6fe" stroke-width="2"/>

    <!-- Bottom row -->
    <circle cx="110" cy="420" r="8" fill="#818cf8" stroke="#c7d2fe" stroke-width="2"/>
    <circle cx="256" cy="455" r="10" fill="#a78bfa" stroke="#ddd6fe" stroke-width="2"/>
    <circle cx="402" cy="420" r="8" fill="#818cf8" stroke="#c7d2fe" stroke-width="2"/>

    <!-- Side nodes -->
    <circle cx="80" cy="380" r="6" fill="#6366f1" stroke="#a5b4fc" stroke-width="1.5"/>
    <circle cx="432" cy="380" r="6" fill="#6366f1" stroke="#a5b4fc" stroke-width="1.5"/>
  </g>

  <!-- Eyes (peeking from under hat brim) -->
  <g>
    <ellipse cx="230" cy="310" rx="12" ry="10" fill="white" opacity="0.9"/>
    <ellipse cx="282" cy="310" rx="12" ry="10" fill="white" opacity="0.9"/>
    <circle cx="233" cy="312" r="5" fill="#1e1b4b"/>
    <circle cx="285" cy="312" r="5" fill="#1e1b4b"/>
    <!-- Eye sparkle -->
    <circle cx="235" cy="310" r="2" fill="white"/>
    <circle cx="287" cy="310" r="2" fill="white"/>
  </g>
</svg>
